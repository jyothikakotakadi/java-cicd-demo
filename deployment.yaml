apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-cicd-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-cicd-app
  template:
    metadata:
      labels:
        app: java-cicd-app
    spec:
      containers:
        - name: java-cicd-container
          image: jyothikakotakadi/java-cicd-demo:latest
          ports:
            - containerPort: 8080
